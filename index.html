<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 静态托管测试页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family: "Microsoft Yahei",sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #222;
        }
        .box{
            background: #fff;
            padding: 40px 60px;
            border-radius: 16px;
            box-shadow: 0 4px 20px #00000015;
            text-align: center;
        }
        h1{
            color: #2563eb;
            margin-bottom: 20px;
        }
        p{
            font-size: 16px;
            line-height: 1.8;
            margin: 8px 0;
            color: #555;
        }
        .tip{
            margin-top: 25px;
            padding: 12px 20px;
            background: #eef2ff;
            border-radius: 8px;
            color: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✅ GitHub Pages 部署成功</h1>
        <p>当前状态：静态网页正常托管</p>
        <p>托管平台：GitHub 免费静态服务器</p>
        <p>支持：HTML / CSS / JS / 图片 / 纯静态资源</p>
        <div class="tip">
            测试完成，可替换成你的网站页面
        </div>
    </div>
</body>
</html>
